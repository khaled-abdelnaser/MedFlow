<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#794925",
                    "secondary-fixed": "#ffdcc6",
                    "on-error-container": "#93000a",
                    "inverse-surface": "#342f2b",
                    "on-surface": "#1f1b17",
                    "surface": "#fff8f5",
                    "outline-variant": "#dfc0b8",
                    "on-surface-variant": "#58423c",
                    "on-primary-fixed-variant": "#852302",
                    "surface-container-low": "#fcf2eb",
                    "on-primary-container": "#fffbff",
                    "error": "#ba1a1a",
                    "surface-container": "#f6ece6",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed-variant": "#004f58",
                    "inverse-primary": "#ffb5a0",
                    "on-tertiary-fixed": "#001f24",
                    "inverse-on-surface": "#f9efe8",
                    "on-secondary": "#ffffff",
                    "surface-variant": "#eae1da",
                    "secondary-fixed-dim": "#fbb88b",
                    "surface-dim": "#e2d8d2",
                    "on-secondary-fixed-variant": "#693c19",
                    "primary": "#a33817",
                    "surface-bright": "#fff8f5",
                    "tertiary": "#006672",
                    "on-secondary-fixed": "#301400",
                    "secondary": "#85532e",
                    "tertiary-fixed": "#9bf0ff",
                    "on-background": "#1f1b17",
                    "surface-container-high": "#f0e6e0",
                    "on-primary-fixed": "#3b0900",
                    "on-tertiary-container": "#f7feff",
                    "on-tertiary": "#ffffff",
                    "surface-tint": "#a63a19",
                    "primary-fixed": "#ffdbd1",
                    "primary-fixed-dim": "#ffb5a0",
                    "secondary-container": "#febb8e",
                    "tertiary-container": "#008190",
                    "outline": "#8b716a",
                    "background": "#fff8f5",
                    "primary-container": "#c4502d",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#eae1da",
                    "tertiary-fixed-dim": "#6ad5e8"

            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Epilogue"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3 {
            font-family: 'Epilogue', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary min-h-screen flex flex-col items-center justify-center overflow-hidden selection:bg-primary-fixed selection:text-primary">
<!-- Success Background Texture -->
<div class="fixed inset-0 pointer-events-none opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary-container blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container blur-[100px]"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center px-6 max-w-md w-full text-center">
<!-- Large Check Icon Component -->
<div class="mb-12 relative">
<div class="absolute inset-0 bg-on-primary rounded-full scale-110 opacity-10 animate-pulse"></div>
<div class="w-32 h-32 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-2xl">
<span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</div>
<!-- Confirmation Text -->
<div class="space-y-3 mb-10">
<h1 class="text-on-primary text-4xl font-extrabold tracking-tight">Booking Confirmed!</h1>
<p class="text-primary-fixed text-lg font-medium opacity-90">Your session has been successfully scheduled with MedFlow.</p>
</div>
<!-- Appointment Detail Card (Glassmorphism) -->
<div class="w-full bg-surface-container-lowest/10 backdrop-blur-2xl rounded-lg p-8 border border-white/10 space-y-6 text-left">
<div class="flex items-start gap-5">
<div class="w-14 h-14 rounded-full overflow-hidden shrink-0 ring-4 ring-white/10">
<img class="w-full h-full object-cover" data-alt="portrait of a professional female doctor in a white lab coat with a warm, reassuring smile against a soft medical background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNFxLHvcuqz4-_uVrfHW_doNpV5elYbNy0_fWlQovIzQCfOXQ2lG1I67pszxW4T8qU_IptnCWdVQb8GKcmrJnonZNPOae0I0t1paZ45kJYixRLsXMrnFNjPmenRXusUj9un1A_Qm8Gv7B0bMcS4jmxkLJcw_Q41gQymehIqVyZ__P8uwv4swCu3qGhuhimB3HNFyKcH1hOo_oNYU8YMsSr4rk0vE8wIkWIOqmAiq5Y1Wp6OZUR7eRwGsWMYsifLf2xX5-gZ2QTkLw"/>
</div>
<div>
<h3 class="text-on-primary text-xl font-bold">Dr. Sarah Jenkins</h3>
<p class="text-primary-fixed text-sm opacity-80 font-medium">Senior Cardiologist</p>
</div>
</div>
<!-- Asymmetric Bento-style Details -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-lowest/15 p-4 rounded-lg">
<p class="text-white/60 text-[10px] uppercase tracking-widest font-bold mb-1">Date</p>
<p class="text-on-primary font-semibold">Oct 24, 2023</p>
</div>
<div class="bg-surface-container-lowest/15 p-4 rounded-lg">
<p class="text-white/60 text-[10px] uppercase tracking-widest font-bold mb-1">Time</p>
<p class="text-on-primary font-semibold">09:30 AM</p>
</div>
<div class="col-span-2 bg-surface-container-lowest/15 p-4 rounded-lg flex items-center justify-between">
<div>
<p class="text-white/60 text-[10px] uppercase tracking-widest font-bold mb-1">Location</p>
<p class="text-on-primary font-semibold">Central Medical Plaza, Floor 4</p>
</div>
<span class="material-symbols-outlined text-on-primary opacity-60">map</span>
</div>
</div>
</div>
<!-- CTA Actions -->
<div class="w-full mt-10 space-y-4">
<button class="w-full bg-surface-container-lowest text-primary py-4 px-8 rounded-full font-bold text-lg shadow-xl hover:scale-[1.02] transition-transform active:scale-95">
                Add to Calendar
            </button>
<button class="w-full bg-transparent border-2 border-white/20 text-on-primary py-4 px-8 rounded-full font-bold text-lg hover:bg-white/5 transition-colors">
                Back to Dashboard
            </button>
</div>
<!-- Metadata Support -->
<p class="mt-12 text-primary-fixed text-sm font-medium opacity-60">
            A confirmation email has been sent to your registered address.
        </p>
</main>
<!-- Bottom Decorative "S" Curve (Minimalist Abstract) -->
<div class="absolute bottom-0 w-full h-24 overflow-hidden opacity-10">
<svg class="w-full h-full preserve-3d" preserveaspectratio="none" viewbox="0 0 1440 320">
<path d="M0,192L80,202.7C160,213,320,235,480,218.7C640,203,800,149,960,138.7C1120,128,1280,160,1360,176L1440,192L1440,320L1360,320C1280,320,1120,320,960,320C800,320,640,320,480,320C320,320,160,320,80,320L0,320Z" fill="#ffffff" fill-opacity="1"></path>
</svg>
</div>
</body></html>
