<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#794925",
                    "secondary-fixed": "#ffdcc6",
                    "on-error-container": "#93000a",
                    "inverse-surface": "#342f2b",
                    "on-surface": "#1f1b17",
                    "surface": "#fff8f5",
                    "outline-variant": "#dfc0b8",
                    "on-surface-variant": "#58423c",
                    "on-primary-fixed-variant": "#852302",
                    "surface-container-low": "#fcf2eb",
                    "on-primary-container": "#fffbff",
                    "error": "#ba1a1a",
                    "surface-container": "#f6ece6",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed-variant": "#004f58",
                    "inverse-primary": "#ffb5a0",
                    "on-tertiary-fixed": "#001f24",
                    "inverse-on-surface": "#f9efe8",
                    "on-secondary": "#ffffff",
                    "surface-variant": "#eae1da",
                    "secondary-fixed-dim": "#fbb88b",
                    "surface-dim": "#e2d8d2",
                    "on-secondary-fixed-variant": "#693c19",
                    "primary": "#a33817",
                    "surface-bright": "#fff8f5",
                    "tertiary": "#006672",
                    "on-secondary-fixed": "#301400",
                    "secondary": "#85532e",
                    "tertiary-fixed": "#9bf0ff",
                    "on-background": "#1f1b17",
                    "surface-container-high": "#f0e6e0",
                    "on-primary-fixed": "#3b0900",
                    "on-tertiary-container": "#f7feff",
                    "on-tertiary": "#ffffff",
                    "surface-tint": "#a63a19",
                    "primary-fixed": "#ffdbd1",
                    "primary-fixed-dim": "#ffb5a0",
                    "secondary-container": "#febb8e",
                    "tertiary-container": "#008190",
                    "outline": "#8b716a",
                    "background": "#fff8f5",
                    "primary-container": "#c4502d",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#eae1da",
                    "tertiary-fixed-dim": "#6ad5e8"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Epilogue"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"],
                    "serif": ["Playfair Display"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#FDF0EC] min-h-screen flex items-center justify-center p-6 selection:bg-primary-fixed selection:text-primary">
<main class="w-full max-w-md">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 md:p-10 shadow-[0_8px_32px_rgba(31,27,23,0.05)] border border-outline-variant/10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 bg-surface-container flex items-center justify-center rounded-full mb-6 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent"></div>
<span class="material-symbols-outlined text-primary text-4xl" data-icon="medical_services">medical_services</span>
</div>
<h1 class="font-serif text-3xl text-on-surface tracking-tight mb-2">Welcome to MedFlow</h1>
<p class="text-on-surface-variant font-label text-sm">Empowering your wellness journey</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 rounded-2xl px-5 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:opacity-80 transition-opacity" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 rounded-2xl px-5 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                    Sign In
                </button>
<!-- Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant/40">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Google Button -->
<button class="w-full bg-surface-container-low border border-outline-variant/20 text-on-surface font-label font-semibold py-4 rounded-full flex items-center justify-center gap-3 hover:bg-surface-container-highest transition-colors active:scale-[0.98] duration-200" type="button">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google G logo in its signature four colors on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA21rVKC__YQdoyh6Vuh9zZy2JAK-rGGbvFQqNkgI5GIxvGMxytEMt0SllrkGhie9TkpHwKQv1ZvsBC5ozpS4uDi2pI1ot50oW1FmiMkH3y6hLXLtIO-_RrCo_P4HC70ozWhlhWfgYRWeBM9tsRxpxOSA0nabtDMbEyQ5r48cNTVecDY-P-0T7cJjBkxV7mc_XopaUosbR3OBEF1uP_gsFsJbMPI1H0gcx_YtrTwrJUS2mSs3jrev4K1kQZq_3RhtP_Sw927B5jQ6A"/>
                    Continue with Google
                </button>
</form>
<!-- Register Link -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm">
                    New to MedFlow? 
                    <a class="font-bold text-primary hover:underline ml-1" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Footer Decorative Elements -->
<div class="mt-8 flex justify-center gap-6 opacity-30">
<div class="flex items-center gap-1 text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant">
<span class="material-symbols-outlined text-[14px]" data-icon="verified_user">verified_user</span>
                Secure Login
            </div>
<div class="flex items-center gap-1 text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant">
<span class="material-symbols-outlined text-[14px]" data-icon="language">language</span>
                EN - US
            </div>
</div>
</main>
<!-- Background Decorative Graphics -->
<div class="fixed top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-tertiary/5 rounded-full blur-[100px] -z-10"></div>
</body></html>
