<div class="bg-surface font-body text-on-surface min-h-screen">
  <!-- Top Navigation (Contextual Header) -->
  <header
    class="flex justify-between items-center px-6 h-16 w-full sticky top-0 z-50 bg-surface/80 backdrop-blur-md"
  >
    <button
      (click)="goBack()"
      class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container transition-colors"
    >
      <span class="material-symbols-outlined text-primary">arrow_back</span>
    </button>
    <h1 class="font-headline font-bold text-xl tracking-tight text-primary">Book Appointment</h1>
    <div class="w-10"></div>
    <!-- Spacer for symmetry -->
  </header>
  <main class="px-6 pb-32 max-w-2xl mx-auto space-y-8">
    <!-- Doctor Mini Card -->
    <section class="mt-4">
      <div
        class="bg-surface-container-lowest p-5 rounded-lg flex items-center gap-4 transition-transform active:scale-[0.98] duration-200"
      >
        <div class="relative">
          <img
            class="w-16 h-16 rounded-full object-cover"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBV3WZTWt7vQSMgTayW5--vYblSqRpDMbCXcZgM5t-eWs8MBHPZBlNR4TiKI_yipcWQWGu46G98pGiSvHH8BqYazK7dZ7dw708CYIiLM57GMr18VG2nbt2PssNC6XY13oVucX-heASGc0KZFKMWXYQ1B8fwDgjs9AdrzqimYPOQqBz9DPrMh4Bl8G6rQIaqRU6Cf2hSB4ovQeTNvad3feSEFoFXt0lrw_fdYeh4W3Ozu7NSDBWeEOJZIjSPNzL4o9ovrohzAeaCXB4"
          />
          <div
            class="absolute bottom-0 right-0 w-4 h-4 bg-tertiary border-2 border-surface-container-lowest rounded-full"
          ></div>
        </div>
        <div>
          <h2 class="font-headline font-bold text-lg text-on-surface leading-none">
            Dr. Julian Thorne
          </h2>
          <p class="text-on-surface-variant text-sm mt-1">Senior Cardiologist • 12 years exp.</p>
          <div class="flex items-center mt-1 gap-1">
            <span
              class="material-symbols-outlined text-[14px] text-tertiary"
              style="font-variation-settings: 'FILL' 1"
              >star</span
            >
            <span class="text-xs font-semibold text-on-surface">4.9 (120 reviews)</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Calendar Picker Section -->
    <section class="space-y-4">
      <div class="flex justify-between items-center">
        <h3 class="font-headline font-bold text-xl text-on-surface">Select Date</h3>
        <div class="flex gap-4">
          <span
            class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors"
            >chevron_left</span
          >
          <span class="font-label font-bold text-sm text-primary uppercase tracking-wider"
            >October 2024</span
          >
          <span
            class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors"
            >chevron_right</span
          >
        </div>
      </div>

      <!-- Bento Calendar Grid -->
      <div class="bg-surface-container-low p-6 rounded-lg">
        <div class="grid grid-cols-7 gap-y-4 text-center">
          <!-- Day Labels -->
          <div
            class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest pb-2"
          >
            Mo
          </div>
          <div
            class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest pb-2"
          >
            Tu
          </div>
          <div
            class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest pb-2"
          >
            We
          </div>
          <div
            class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest pb-2"
          >
            Th
          </div>
          <div
            class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest pb-2"
          >
            Fr
          </div>
          <div
            class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest pb-2"
          >
            Sa
          </div>
          <div
            class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest pb-2"
          >
            Su
          </div>

          <div class="text-stone-300 py-2 text-sm">30</div>
          <div
            class="text-on-surface py-2 text-sm font-medium hover:bg-surface-container transition-all cursor-pointer rounded-full"
          >
            1
          </div>
          <div
            class="text-on-surface py-2 text-sm font-medium hover:bg-surface-container transition-all cursor-pointer rounded-full"
          >
            2
          </div>
          <div
            class="text-on-surface py-2 text-sm font-medium hover:bg-surface-container transition-all cursor-pointer rounded-full"
          >
            3
          </div>
          <div
            class="text-on-surface py-2 text-sm font-medium hover:bg-surface-container transition-all cursor-pointer rounded-full"
          >
            4
          </div>
          <div class="text-stone-300 py-2 text-sm">5</div>
          <div class="text-stone-300 py-2 text-sm">6</div>
          <div class="text-on-surface py-2 text-sm font-medium">10</div>
          <div
            class="py-2 text-sm font-bold bg-primary text-on-primary rounded-full shadow-md shadow-primary/30 transform scale-105"
          >
            11
          </div>
          <div class="text-on-surface py-2 text-sm font-medium hover:bg-surface-container">12</div>
        </div>
      </div>
    </section>

    <div class="mt-8">
      <button
        class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200"
      >
        Confirm Booking
      </button>
    </div>
  </main>
</div>
