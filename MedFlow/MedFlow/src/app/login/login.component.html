<main
  class="w-full max-w-md mx-auto min-h-screen flex items-center justify-center p-6 selection:bg-primary-fixed selection:text-primary"
>
  <!-- Login Card -->
  <div
    class="w-full bg-surface-container-lowest rounded-lg p-8 md:p-10 shadow-[0_8px_32px_rgba(31,27,23,0.05)] border border-outline-variant/10"
  >
    <!-- Logo Section -->
    <div class="flex flex-col items-center mb-10">
      <div
        class="w-20 h-20 bg-surface-container flex items-center justify-center rounded-full mb-6 relative overflow-hidden"
      >
        <div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent"></div>
        <span class="material-symbols-outlined text-primary text-4xl" data-icon="medical_services"
          >medical_services</span
        >
      </div>
      <h1 class="font-serif text-3xl text-on-surface tracking-tight mb-2">Welcome to MedFlow</h1>
      <p class="text-on-surface-variant font-label text-sm">Empowering your wellness journey</p>
    </div>
    <!-- Login Form -->
    <form class="space-y-6">
      <!-- Email Input -->
      <div class="space-y-2">
        <label
          class="block font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1"
          for="email"
          >Email Address</label
        >
        <div class="relative">
          <input
            class="w-full bg-surface-container-low border-0 rounded-2xl px-5 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300"
            id="email"
            placeholder="name@example.com"
            type="email"
          />
        </div>
      </div>
      <!-- Password Input -->
      <div class="space-y-2">
        <div class="flex justify-between items-center ml-1">
          <label
            class="block font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant"
            for="password"
            >Password</label
          >
          <a class="text-xs font-bold text-primary hover:opacity-80 transition-opacity" href="#"
            >Forgot?</a
          >
        </div>
        <div class="relative">
          <input
            class="w-full bg-surface-container-low border-0 rounded-2xl px-5 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300"
            id="password"
            placeholder="••••••••"
            type="password"
          />
          <button
            class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-primary transition-colors"
            type="button"
          >
            <span class="material-symbols-outlined text-[20px]" data-icon="visibility"
              >visibility</span
            >
          </button>
        </div>
      </div>
      <!-- Sign In Button -->
      <button
        routerLink="/home"
        class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200"
        type="button"
      >
        Sign In
      </button>
      <!-- Divider -->
      <div class="relative py-4 flex items-center">
        <div class="flex-grow border-t border-outline-variant/30"></div>
        <span
          class="flex-shrink mx-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant/40"
          >or</span
        >
        <div class="flex-grow border-t border-outline-variant/30"></div>
      </div>
      <!-- Google Button -->
      <button
        class="w-full bg-surface-container-low border border-outline-variant/20 text-on-surface font-label font-semibold py-4 rounded-full flex items-center justify-center gap-3 hover:bg-surface-container-highest transition-colors active:scale-[0.98] duration-200"
        type="button"
      >
        <img
          alt="Google Logo"
          class="w-5 h-5"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuA21rVKC__YQdoyh6Vuh9zZy2JAK-rGGbvFQqNkgI5GIxvGMxytEMt0SllrkGhie9TkpHwKQv1ZvsBC5ozpS4uDi2pI1ot50oW1FmiMkH3y6hLXLtIO-_RrCo_P4HC70ozWhlhWfgYRWeBM9tsRxpxOSA0nabtDMbEyQ5r48cNTVecDY-P-0T7cJjBkxV7mc_XopaUosbR3OBEF1uP_gsFsJbMPI1H0gcx_YtrTwrJUS2mSs3jrev4K1kQZq_3RhtP_Sw927B5jQ6A"
        />
        Continue with Google
      </button>
    </form>
    <!-- Register Link -->
    <div class="mt-10 text-center">
      <p class="text-on-surface-variant text-sm">
        New to MedFlow?
        <a class="font-bold text-primary hover:underline ml-1" href="#">Create an account</a>
      </p>
    </div>
  </div>
</main>
